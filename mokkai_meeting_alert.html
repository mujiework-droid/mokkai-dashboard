<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>木介設計｜平面會議提醒看板</title>
<style>
  :root {
    --bg:#f5f6f8;--surface:#fff;--surface2:#f8f9fb;--border:#e4e7ef;--border2:#eef0f6;
    --red:#c62828;--red-bg:#fef2f2;--red-bd:#fecaca;
    --orange:#c25000;--orange-bg:#fff7ed;--orange-bd:#fed7aa;
    --blue:#1a56cc;--blue-bg:#eff6ff;--blue-bd:#bfdbfe;
    --green:#166534;--green-bg:#f0fdf4;--green-bd:#bbf7d0;
    --text:#1a1d2e;--muted:#6b7280;--dim:#9ca3af;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif;font-size:13px;}
  .header{background:var(--surface);border-bottom:1px solid var(--border);padding:13px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,0.05);}
  .logo{width:32px;height:32px;background:#2563eb;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;}
  .h-title{font-size:14px;font-weight:700;}
  .h-sub{font-size:11px;color:var(--muted);margin-top:1px;}
  .refresh-btn{background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-family:inherit;}
  .refresh-btn:hover{background:var(--surface2);}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:18px 24px 6px;}
  .sc{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px 16px;cursor:pointer;transition:box-shadow 0.15s,transform 0.1s;border-left:4px solid transparent;user-select:none;}
  .sc:hover{box-shadow:0 2px 8px rgba(0,0,0,0.08);transform:translateY(-1px);}
  .sc-label{font-size:10px;color:var(--muted);margin-bottom:5px;font-weight:500;}
  .sc-val{font-size:26px;font-weight:700;line-height:1;}
  .sc-hint{font-size:10px;color:var(--dim);margin-top:3px;}
  .sc.red{border-left-color:var(--red);}.sc.red .sc-val{color:var(--red);}
  .sc.orange{border-left-color:var(--orange);}.sc.orange .sc-val{color:var(--orange);}
  .sc.blue{border-left-color:var(--blue);}.sc.blue .sc-val{color:var(--blue);}
  .sc.green{border-left-color:var(--green);}.sc.green .sc-val{color:var(--green);}
  .tabs{display:flex;gap:6px;padding:10px 24px 0;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:57px;z-index:90;}
  .tab{padding:7px 14px;border-radius:6px 6px 0 0;font-size:12px;font-weight:500;cursor:pointer;color:var(--muted);border:1px solid transparent;border-bottom:none;background:transparent;transition:all 0.15s;white-space:nowrap;}
  .tab:hover{color:var(--text);background:var(--surface2);}
  .tab.active{color:var(--text);background:var(--surface);border-color:var(--border);border-bottom:2px solid var(--surface);margin-bottom:-1px;}
  .tab .cnt{display:inline-block;min-width:18px;padding:0 5px;background:var(--border);border-radius:10px;font-size:10px;text-align:center;margin-left:5px;}
  .tab.t-red.active .cnt{background:var(--red-bg);color:var(--red);}
  .tab.t-orange.active .cnt{background:var(--orange-bg);color:var(--orange);}
  .tab.t-blue.active .cnt{background:var(--blue-bg);color:var(--blue);}
  .tab.t-green.active .cnt{background:var(--green-bg);color:var(--green);}
  .section{padding:18px 24px;display:none;}
  .section.visible{display:block;}
  .sec-hd{display:flex;align-items:center;gap:7px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border);}
  .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .sec-title{font-size:13px;font-weight:700;}
  .sec-desc{font-size:11px;color:var(--muted);}
  .sec-cnt{margin-left:auto;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:2px 10px;font-size:10px;color:var(--muted);}
  .tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border);}
  table{width:100%;border-collapse:collapse;background:var(--surface);min-width:820px;}
  thead tr{background:var(--surface2);}
  th{padding:8px 10px;text-align:left;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--border);white-space:nowrap;}
  td{padding:10px 10px;font-size:12px;border-bottom:1px solid var(--border2);vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  tbody tr:hover td{background:#f8f9fd;}
  .td-name{font-weight:600;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .td-m{color:var(--muted);}
  .td-date{font-size:11px;color:var(--muted);white-space:nowrap;}
  .chip{display:inline-flex;align-items:center;padding:2px 8px;border-radius:5px;font-size:10px;font-weight:700;white-space:nowrap;}
  .c-red{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd);}
  .c-orange{background:var(--orange-bg);color:var(--orange);border:1px solid var(--orange-bd);}
  .c-blue{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bd);}
  .src{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;white-space:nowrap;}
  .s-web{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe;}
  .s-eddy{background:#fff7ed;color:#c2410c;border:1px solid #fed7aa;}
  .s-intro{background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0;}
  .s-old{background:#faf5ff;color:#7e22ce;border:1px solid #e9d5ff;}
  .s-self{background:#fffbeb;color:#b45309;border:1px solid #fde68a;}
  .s-other{background:#f3f4f6;color:#374151;border:1px solid #d1d5db;}
  .staff-row{display:flex;gap:3px;flex-wrap:wrap;align-items:center;}
  .av{width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;border:1.5px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,0.08);}
  .days-chip{display:inline-block;padding:3px 8px;border-radius:5px;font-size:11px;font-weight:700;}
  .d-over{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd);}
  .d-today{background:var(--orange-bg);color:var(--orange);border:1px solid var(--orange-bd);}
  .d-soon{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bd);}
  .empty{text-align:center;padding:30px;color:var(--dim);font-size:12px;background:var(--surface2);border-radius:10px;border:1px solid var(--border);}
  .loading{text-align:center;padding:50px;color:var(--muted);}
  .spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:#2563eb;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 10px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  @media(max-width:600px){.stats{grid-template-columns:repeat(2,1fr);}.section,.stats,.tabs{padding-left:14px;padding-right:14px;}}
</style>
</head>
<body>
<div class="header">
  <div style="display:flex;align-items:center;gap:10px;">
    <div class="logo">木介</div>
    <div>
      <div class="h-title">平面會議提醒看板</div>
      <div class="h-sub">資料來源：2026丈量分配 · 每次開啟即更新</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:8px;">
    <span id="upd" style="font-size:11px;color:var(--dim);">載入中…</span>
    <button class="refresh-btn" onclick="loadData()">↻ 重新整理</button>
  </div>
</div>

<div class="stats">
  <div class="sc red"    onclick="showTab('overdue')"><div class="sc-label">逾期未約</div><div class="sc-val" id="s1">—</div><div class="sc-hint">已超過 +5 工作天</div></div>
  <div class="sc orange" onclick="showTab('soon')"   ><div class="sc-label">即將到期</div><div class="sc-val" id="s2">—</div><div class="sc-hint">5 工作天內需要約</div></div>
  <div class="sc blue"   onclick="showTab('nodes')"  ><div class="sc-label">未分配設計師</div><div class="sc-val" id="s3">—</div><div class="sc-hint">設計師欄空白</div></div>
  <div class="sc green"  onclick="showTab('all')"    ><div class="sc-label">待處理合計</div><div class="sc-val" id="s4">—</div><div class="sc-hint">今日需關注</div></div>
</div>

<div class="tabs">
  <div class="tab t-red    active" id="tab-overdue" onclick="showTab('overdue')">逾期未約     <span class="cnt" id="tc1">—</span></div>
  <div class="tab t-orange"        id="tab-soon"    onclick="showTab('soon')"   >即將到期     <span class="cnt" id="tc2">—</span></div>
  <div class="tab t-blue"          id="tab-nodes"   onclick="showTab('nodes')"  >未分配設計師 <span class="cnt" id="tc3">—</span></div>
  <div class="tab t-green"         id="tab-all"     onclick="showTab('all')"    >全部待處理   <span class="cnt" id="tc4">—</span></div>
</div>

<div class="section visible" id="sec-overdue"></div>
<div class="section"         id="sec-soon"></div>
<div class="section"         id="sec-nodes"></div>
<div class="section"         id="sec-all"></div>

<script>
const SID   = '1Slhin4aVs02SN6YdaraPvMRN7rMQW2YcLqrC1UBXeck';
const SHEET = '2026丈量分配';

// 欄位固定 index（A=0,B=1,C=2,D=3,E=4,F=5,G=6,H=7,I=8,J=9,K=10,N=13,O=14）
const COL = { name:2, des:3, mdate:6, meas1:7, meas2:8, layout:9, plan:10, src:13, biz:14 };

const HOLS = new Set(['2026-01-01','2026-01-02','2026-01-28','2026-01-29','2026-01-30','2026-01-31','2026-02-02','2026-02-03','2026-02-28','2026-04-03','2026-04-04','2026-04-05','2026-05-01','2026-06-19','2026-09-03','2026-10-09','2026-10-10']);
const isOff  = d => d.getDay()===0||d.getDay()===6||HOLS.has(d.toISOString().slice(0,10));
const addWD  = (d,n) => { let r=new Date(d),c=0; while(c<n){r.setDate(r.getDate()+1);if(!isOff(r))c++;} return r; };
const wdBet  = (a,b) => { let d=new Date(a),c=0; if(d>=b)return 0; while(d<b){d.setDate(d.getDate()+1);if(!isOff(d))c++;} return c; };
const fmt    = d => d?`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`:'—';
const parseD = (v,f) => {
  if(!v&&!f)return null;
  const m=String(v||'').match(/Date\((\d+),(\d+),(\d+)/);
  if(m)return new Date(+m[1],+m[2],+m[3]);
  const s=String(f||v||'').trim().replace(/\//g,'-');
  const d=new Date(s); return isNaN(d)?null:d;
};

// 略過非資料列
const SKIP_KW=['月份','案件名稱','禁止','丈量日','平面日','放樣','文量','來源','業務','設計師','序號','一辦','二辦','三辦'];
const skipRow = n => !n||String(n).trim()===''||SKIP_KW.some(k=>String(n).includes(k));

// 人員頭像
const AV_COLS=[['#dbeafe','#1e40af'],['#d1fae5','#065f46'],['#fde8d8','#9a3412'],['#ede9fe','#5b21b6'],['#fce7f3','#9d174d'],['#fef9c3','#854d0e']];
const avm={}; let avi=0;
const avCol = n => { if(!n)return AV_COLS[5]; if(!avm[n]){avm[n]=AV_COLS[avi%AV_COLS.length];avi++;} return avm[n]; };
const avatar = n => { const[bg,fg]=avCol(n); return `<span class="av" style="background:${bg};color:${fg};" title="${n}">${n.slice(0,2)}</span>`; };
const staffHtml = arr => arr&&arr.length?`<div class="staff-row">${arr.map(avatar).join('')}</div>`:'<span class="td-m">—</span>';

const srcHtml = s => {
  if(!s||s==='')return '<span class="td-m">—</span>';
  let cls='s-other';
  if(s.includes('網路'))cls='s-web';
  else if(s.includes('Eddy')||s.includes('業務'))cls='s-eddy';
  else if(s.includes('介紹'))cls='s-intro';
  else if(s.includes('前')||s.includes('客變'))cls='s-old';
  else if(s.includes('自地')||s.includes('自建'))cls='s-self';
  return `<span class="src ${cls}">${s}</span>`;
};

function showTab(id){
  ['overdue','soon','nodes','all'].forEach(t=>{
    document.getElementById('sec-'+t).classList.toggle('visible',t===id);
    document.getElementById('tab-'+t).classList.toggle('active',t===id);
  });
  window.scrollTo({top:0,behavior:'smooth'});
}

const TH_MAIN = ['案件名稱','設計師','丈量人員','放樣人員','來源','業務諮詢','丈量日','提醒日 +5工','最晚約 +10工','狀態'];
const TH_NOD  = ['案件名稱','丈量人員','放樣人員','來源','業務諮詢','丈量日','需在此前分配 +5工','平面最晚約 +10工'];

function renderSection(elId, dotColor, title, desc, rows, isNoDes){
  const el=document.getElementById(elId);
  const TH=isNoDes?TH_NOD:TH_MAIN;
  const thead=`<thead><tr>${TH.map(h=>`<th>${h}</th>`).join('')}</tr></thead>`;

  if(!rows.length){
    el.innerHTML=`<div class="sec-hd"><div class="dot" style="background:${dotColor}"></div><span class="sec-title">${title}</span><span class="sec-desc">${desc}</span><span class="sec-cnt">0 件</span></div><div class="empty">✓ 目前沒有待處理案件</div>`;
    return;
  }

  const tbody=rows.map(r=>{
    let st='';
    if(!isNoDes){
      if(r.over>0) st=`<span class="days-chip d-over">+${r.over} 天逾期</span>`;
      else if(r.toAlert===0) st=`<span class="days-chip d-today">今天！</span>`;
      else st=`<span class="days-chip d-soon">還有 ${r.toAlert} 天</span>`;
    }
    const aC=r.over>0?'var(--red)':'var(--orange)';
    if(isNoDes) return `<tr>
      <td class="td-name" title="${r.name}">${r.name}</td>
      <td>${staffHtml(r.meas)}</td><td>${staffHtml(r.layout)}</td>
      <td>${srcHtml(r.src)}</td>
      <td>${r.biz?`<span class="chip c-orange">${r.biz}</span>`:'<span class="td-m">—</span>'}</td>
      <td class="td-date">${fmt(r.md)}</td>
      <td><span style="font-size:11px;font-weight:600;color:var(--red)">${fmt(r.alert5)}</span></td>
      <td class="td-date">${fmt(r.latest10)}</td>
    </tr>`;
    return `<tr>
      <td class="td-name" title="${r.name}">${r.name}</td>
      <td>${r.des?`<span class="chip c-blue">${r.des}</span>`:'<span class="td-m">—</span>'}</td>
      <td>${staffHtml(r.meas)}</td><td>${staffHtml(r.layout)}</td>
      <td>${srcHtml(r.src)}</td>
      <td>${r.biz?`<span class="chip c-orange">${r.biz}</span>`:'<span class="td-m">—</span>'}</td>
      <td class="td-date">${fmt(r.md)}</td>
      <td><span style="font-size:11px;font-weight:600;color:${aC}">${fmt(r.alert5)}</span></td>
      <td class="td-date">${fmt(r.latest10)}</td>
      <td>${st}</td>
    </tr>`;
  }).join('');

  el.innerHTML=`
    <div class="sec-hd">
      <div class="dot" style="background:${dotColor}"></div>
      <span class="sec-title">${title}</span>
      <span class="sec-desc">${desc}</span>
      <span class="sec-cnt">${rows.length} 件</span>
    </div>
    <div class="tbl-wrap"><table>${thead}<tbody>${tbody}</tbody></table></div>`;
}

async function loadData(){
  ['overdue','soon','nodes','all'].forEach(id=>
    document.getElementById('sec-'+id).innerHTML=`<div class="loading"><div class="spinner"></div>載入中…</div>`
  );
  try{
    const url=`https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET)}`;
    const res=await fetch(url);
    const text=await res.text();
    const json=JSON.parse(text.replace(/^[^\(]*\(|\);\s*$/gs,''));
    const rows=json.table.rows;
    const today=new Date(); today.setHours(0,0,0,0);

    const noD=[],overdue=[],soon=[];

    rows.forEach(row=>{
      const c=row.c||[];
      const g=i=>(c[i]&&c[i].v!=null)?String(c[i].v).trim():'';

      const name=g(COL.name);
      if(!name||skipRow(name))return;

      // 只抓 2026 年以後的案件
      const mRaw=c[COL.mdate];
      const md=mRaw?parseD(mRaw.v,mRaw.f):null;
      if(!md||md.getFullYear()<2026)return;

      const des    = g(COL.des);
      const meas   = [g(COL.meas1),g(COL.meas2)].filter(Boolean);
      const layout = [g(COL.layout)].filter(Boolean);
      const pRaw   = c[COL.plan];
      const plan   = pRaw?parseD(pRaw.v,pRaw.f):null;
      const src    = g(COL.src);
      const biz    = g(COL.biz);

      const hasDes  = des!=='';
      const hasPlan = plan&&!isNaN(plan);
      const alert5  = addWD(md,5);
      const latest10= addWD(md,10);
      const over    = alert5<=today?wdBet(alert5,today):0;
      const toAlert = alert5>today ?wdBet(today,alert5):0;

      const rec={name,des,md,alert5,latest10,over,toAlert,meas,layout,src,biz};

      if(!hasDes)                               noD.push(rec);
      else if(!hasPlan&&alert5<=today)          overdue.push(rec);
      else if(!hasPlan&&alert5>today&&toAlert<=5) soon.push(rec);
    });

    overdue.sort((a,b)=>b.over-a.over);
    soon.sort((a,b)=>a.toAlert-b.toAlert);
    const all=[...overdue,...soon,...noD];

    document.getElementById('s1').textContent=overdue.length;
    document.getElementById('s2').textContent=soon.length;
    document.getElementById('s3').textContent=noD.length;
    document.getElementById('s4').textContent=all.length;
    document.getElementById('tc1').textContent=overdue.length;
    document.getElementById('tc2').textContent=soon.length;
    document.getElementById('tc3').textContent=noD.length;
    document.getElementById('tc4').textContent=all.length;

    renderSection('sec-overdue','#c62828','逾期未約平面會議','— 已超過丈量後5個工作天',overdue,false);
    renderSection('sec-soon',  '#c25000','即將需要約平面會議','— 5個工作天內到提醒日',soon,false);
    renderSection('sec-nodes', '#1a56cc','未分配設計師','— 有丈量日但設計師欄空白',noD,true);

    // 全部頁
    const allEl=document.getElementById('sec-all');
    if(!all.length){ allEl.innerHTML=`<div class="empty">✓ 目前沒有待處理案件</div>`; }
    else{
      const parts=[
        {label:'逾期未約',dot:'#c62828',data:overdue,isNoDes:false},
        {label:'即將到期',dot:'#c25000',data:soon,isNoDes:false},
        {label:'未分配設計師',dot:'#1a56cc',data:noD,isNoDes:true},
      ].filter(s=>s.data.length);

      allEl.innerHTML=parts.map(s=>{
        const TH=s.isNoDes?TH_NOD:TH_MAIN;
        const thead=`<thead><tr>${TH.map(h=>`<th>${h}</th>`).join('')}</tr></thead>`;
        const tbody=s.data.map(r=>{
          let st='';
          if(!s.isNoDes){
            if(r.over>0)st=`<span class="days-chip d-over">+${r.over}天逾期</span>`;
            else if(r.toAlert===0)st=`<span class="days-chip d-today">今天！</span>`;
            else st=`<span class="days-chip d-soon">還有${r.toAlert}天</span>`;
          }
          const aC=r.over>0?'var(--red)':'var(--orange)';
          if(s.isNoDes) return `<tr><td class="td-name" title="${r.name}">${r.name}</td><td>${staffHtml(r.meas)}</td><td>${staffHtml(r.layout)}</td><td>${srcHtml(r.src)}</td><td>${r.biz?`<span class="chip c-orange">${r.biz}</span>`:'<span class="td-m">—</span>'}</td><td class="td-date">${fmt(r.md)}</td><td><span style="font-size:11px;font-weight:600;color:var(--red)">${fmt(r.alert5)}</span></td><td class="td-date">${fmt(r.latest10)}</td></tr>`;
          return `<tr><td class="td-name" title="${r.name}">${r.name}</td><td>${r.des?`<span class="chip c-blue">${r.des}</span>`:'<span class="td-m">—</span>'}</td><td>${staffHtml(r.meas)}</td><td>${staffHtml(r.layout)}</td><td>${srcHtml(r.src)}</td><td>${r.biz?`<span class="chip c-orange">${r.biz}</span>`:'<span class="td-m">—</span>'}</td><td class="td-date">${fmt(r.md)}</td><td><span style="font-size:11px;font-weight:600;color:${aC}">${fmt(r.alert5)}</span></td><td class="td-date">${fmt(r.latest10)}</td><td>${st}</td></tr>`;
        }).join('');
        return `<div style="margin-bottom:20px;"><div class="sec-hd"><div class="dot" style="background:${s.dot}"></div><span class="sec-title">${s.label}</span><span class="sec-cnt">${s.data.length} 件</span></div><div class="tbl-wrap"><table>${thead}<tbody>${tbody}</tbody></table></div></div>`;
      }).join('');
    }

    document.getElementById('upd').textContent=`更新：${fmt(today)}`;
  }catch(e){
    ['overdue','soon','nodes','all'].forEach(id=>
      document.getElementById('sec-'+id).innerHTML=`<div style="padding:20px;color:var(--red)">⚠ 載入失敗：${e.message}<br><small style="color:var(--dim)">請確認試算表已開放「知道連結的人可以檢視」</small></div>`
    );
  }
}
loadData();
</script>
</body>
</html>
